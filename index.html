<!DOCTYPE html>
<html>
<body>
  <h3>Segure a tecla "Espaço" para atirar</h3>
  <canvas id="gameCanvas" width="400" height="200" style="border:1px solid #000;"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let atirando = false;
    let intervaloTiro = 0;

    // Detecta quando a tecla é pressionada
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') atirando = true;
    });

    // Detecta quando a tecla é solta
    window.addEventListener('keyup', (e) => {
      if (e.code === 'Space') atirando = false;
    });

    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (atirando) {
        intervaloTiro++;
        // Controla a cadência (atira a cada 10 frames)
        if (intervaloTiro % 10 === 0) {
          console.log("🔥 TIRO!"); 
          desenharTiro();
        }
      }

      requestAnimationFrame(gameLoop);
    }

    function desenharTiro() {
      ctx.fillStyle = 'red';
      ctx.fillRect(Math.random() * canvas.width, 50, 5, 10);
    }

    gameLoop();
  </script>
</body>
</html>
