<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Shooter</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050510; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #1b2735 0%, #090a0f 100%); }
        
        #rocket {
            position: absolute; bottom: 20px; left: 50%;
            width: 40px; height: 50px; background: #ddd;
            border-radius: 50% 50% 10% 10%; transform: translateX(-50%);
            box-shadow: 0 0 15px white;
        }

        .laser {
            position: absolute; width: 4px; height: 20px;
            background: #00ffcc; box-shadow: 0 0 10px #00ffcc;
            border-radius: 2px;
        }

        .meteor {
            position: absolute; width: 40px; height: 40px;
            background: #555; border-radius: 50%;
        }

        #ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">Pontos: <span id="score">0</span></div>
    <div id="rocket"></div>
</div>

<script>
    const container = document.getElementById('game-container');
    const rocket = document.getElementById('rocket');
    const scoreElement = document.getElementById('score');

    let rocketX = window.innerWidth / 2;
    let score = 0;
    let gameActive = true;

    // Movimentação e Tiro
    document.addEventListener('keydown', (e) => {
        if (!gameActive) return;
        if (e.key === 'ArrowLeft' && rocketX > 30) rocketX -= 25;
        if (e.key === 'ArrowRight' && rocketX < window.innerWidth - 30) rocketX += 25;
        if (e.key === ' ' || e.key === 'ArrowUp') shoot();
        
        rocket.style.left = rocketX + 'px';
    });

    function shoot() {
        const laser = document.createElement('div');
        laser.classList.add('laser');
        laser.style.left = (rocketX) + 'px';
        laser.style.bottom = '70px';
        container.appendChild(laser);

        let laserPos = 70;
        const moveLaser = setInterval(() => {
            laserPos += 10;
            laser.style.bottom = laserPos + 'px';

            // Checar se acertou algum meteoro
            const meteors = document.querySelectorAll('.meteor');
            meteors.forEach(meteor => {
                if (isColliding(laser, meteor)) {
                    meteor.remove();
                    laser.remove();
                    clearInterval(moveLaser);
                    score += 10;
                    scoreElement.innerText = score;
                }
            });

            if (laserPos > window.innerHeight) {
                clearInterval(moveLaser);
                laser.remove();
            }
        }, 10);
    }

    function createMeteor() {
        if (!gameActive) return;
        const meteor = document.createElement('div');
        meteor.classList.add('meteor');
        meteor.style.left = Math.random() * (window.innerWidth - 40) + 'px';
        meteor.style.top = '-50px';
        container.appendChild(meteor);

        let meteorY = -50;
        const fall = setInterval(() => {
            meteorY += 4;
            meteor.style.top = meteorY + 'px';

            if (isColliding(meteor, rocket)) gameOver();

            if (meteorY > window.innerHeight) {
                clearInterval(fall);
                meteor.remove();
            }
        }, 20);
    }

    function isColliding(a, b) {
        const rect1 = a.getBoundingClientRect();
        const rect2 = b.getBoundingClientRect();
        return !(rect1.right < rect2.left || rect1.left > rect2.right || 
                 rect1.bottom < rect2.top || rect1.top > rect2.bottom);
    }

    function gameOver() {
        gameActive = false;
        alert("GAME OVER! Pontuação: " + score);
        location.reload();
    }

    setInterval(createMeteor, 1200);
</script>
</body>
</html>
