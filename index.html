<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Guardian - Foguete</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #020205;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('https://www.transparenttextures.com/patterns/stardust.png'), 
                        radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }

        /* Placar */
        #ui-score {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffcc;
            z-index: 10;
        }

        /* Foguete */
        #rocket {
            position: absolute;
            bottom: 30px;
            left: 50%;
            width: 50px;
            height: 50px;
            transform: translateX(-50%);
            transition: left 0.1s ease-out;
        }

        .laser {
            position: absolute;
            width: 4px;
            height: 20px;
            background: #ff0055;
            box-shadow: 0 0 8px #ff0055;
            border-radius: 2px;
        }

        .meteor {
            position: absolute;
            width: 45px;
            height: 45px;
            background: #444;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; /* Formato irregular */
            box-shadow: inset -5px -5px 15px #000;
        }

        /* Animação de explosão simples */
        .explosion {
            position: absolute;
            width: 50px;
            height: 50px;
            background: orange;
            border-radius: 50%;
            filter: blur(10px);
            animation: explode 0.3s forwards;
        }

        @keyframes explode {
            to { transform: scale(2); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-score">PONTOS: <span id="score-val">0</span></div>
    
    <div id="rocket">
        <svg viewBox="0 0 24 24" fill="white">
            <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"></path>
            <path d="M12,18V2" stroke="rgba(255,255,255,0.2)"></path>
        </svg>
        <div style="width: 10px; height: 20px; background: orange; margin: -5px auto; border-radius: 50%; filter: blur(2px); animation: flicker 0.1s infinite alternate;"></div>
    </div>
</div>

<style>
    @keyframes flicker { from { opacity: 0.5; height: 15px; } to { opacity: 1; height: 25px; } }
</style>

<script>
    const container = document.getElementById('game-container');
    const rocket = document.getElementById('rocket');
    const scoreVal = document.getElementById('score-val');

    let rocketX = window.innerWidth / 2;
    let score = 0;
    let gameActive = true;

    // Movimentação e Tiro
    document.addEventListener('keydown', (e) => {
        if (!gameActive) return;
        
        const speed = 30;
        if (e.key === 'ArrowLeft' && rocketX > 40) rocketX -= speed;
        if (e.key === 'ArrowRight' && rocketX < window.innerWidth - 40) rocketX += speed;
        
        // Atirar com Espaço ou Seta para Cima
        if (e.key === ' ' || e.key === 'ArrowUp') {
            shoot();
        }

        rocket.style.left = rocketX + 'px';
    });

    function shoot() {
        const laser = document.createElement('div');
        laser.classList.add('laser');
        laser.style.left = rocketX + 'px';
        laser.style.bottom = '80px';
        container.appendChild(laser);

        let laserPos = 80;
        const laserInterval = setInterval(() => {
            laserPos += 12;
            laser.style.bottom = laserPos + 'px';

            // Colisão do Laser com Meteoros
            const meteors = document.querySelectorAll('.meteor');
            meteors.forEach(met => {
                if (checkCollision(laser, met)) {
                    createExplosion(met.offsetLeft, met.offsetTop);
                    met.remove();
                    laser.remove();
                    clearInterval(laserInterval);
                    score += 10;
                    scoreVal.innerText = score;
                }
            });

            if (laserPos > window.innerHeight) {
                clearInterval(laserInterval);
                laser.remove();
            }
        }, 16);
    }

    function createMeteor() {
        if (!gameActive) return;

        const meteor = document.createElement('div');
        meteor.classList.add('meteor');
        meteor.style.left = Math.random() * (window.innerWidth - 50) + 'px';
        meteor.style.top = '-60px';
        container.appendChild(meteor);

        let meteorY = -60;
        const fallSpeed = 3 + (score / 100); // Fica mais difícil com o tempo

        const fallInterval = setInterval(() => {
            meteorY += fallSpeed;
            meteor.style.top = meteorY + 'px';

            // Colisão Meteoro com Foguete
            if (checkCollision(meteor, rocket)) {
                gameOver();
            }

            if (meteorY > window.innerHeight) {
                clearInterval(fallInterval);
                meteor.remove();
            }
        }, 20);
    }

    function createExplosion(x, y) {
        const exp = document.createElement('div');
        exp.classList.add('explosion');
        exp.style.left = x + 'px';
        exp.style.top = y + 'px';
        container.appendChild(exp);
        setTimeout(() => exp.remove(), 300);
    }

    function checkCollision(obj1, obj2) {
        const r1 = obj1.getBoundingClientRect();
        const r2 = obj2.getBoundingClientRect();
        return !(r1.right < r2.left || r1.left > r2.right || 
                 r1.bottom < r2.top || r1.top > r2.bottom);
    }

    function gameOver() {
        gameActive = false;
        alert("MISSÃO ABORTADA!\nSua pontuação final: " + score);
        location.reload();
    }

    // Criar meteoros a cada 1.2 segundos
    setInterval(createMeteor, 1200);

</script>
</body>
</html>
