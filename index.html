<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Guardian: Invasão</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #game-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); 
            z-index: 1;
        }

        /* --- ELEMENTOS DE FUNDO --- */
        .moon {
            position: absolute; top: 50px; right: 10%; width: 120px; height: 120px;
            background: #f5f3ce; border-radius: 50%;
            box-shadow: 0 0 50px rgba(245, 243, 206, 0.4), inset -15px -15px 30px rgba(0,0,0,0.2);
            z-index: 0; animation: moonFloat 150s linear infinite;
        }

        .satellite {
            position: absolute; width: 40px; height: 15px; z-index: 2;
            animation: moveSat 8s linear forwards;
        }
        .sat-body { width: 12px; height: 12px; background: #999; margin: 0 auto; border-radius: 2px; }
        .sat-wing { position: absolute; top: 4px; width: 15px; height: 6px; background: #3366ff; border: 1px solid #fff; }
        .wing-left { left: 0; }
        .wing-right { right: 0; }

        /* --- A NAVE ESPACIAL --- */
        #spaceship {
            position: absolute;
            bottom: 30px;
            left: 50%;
            width: 60px;
            height: 70px;
            transform: translateX(-50%);
            z-index: 5;
            transition: left 0.1s ease-out;
        }

        .ship-body {
            position: absolute;
            top: 10px; left: 15px;
            width: 30px; height: 45px;
            background: #d1d1d1;
            border-radius: 50% 50% 20% 20%;
            box-shadow: inset -5px 0 10px #777;
        }

        .ship-cockpit {
            position: absolute;
            top: 15px; left: 22px;
            width: 16px; height: 12px;
            background: #33ccff;
            border-radius: 50%;
            z-index: 6;
        }

        .ship-wing {
            position: absolute;
            bottom: 15px;
            width: 20px; height: 25px;
            background: #a1a1a1;
            clip-path: polygon(100% 0, 0% 100%, 100% 100%);
        }
        .wing-l { left: -5px; transform: scaleX(-1); }
        .wing-r { right: -5px; }

        .engine-fire {
            position: absolute;
            bottom: -5px; left: 22px;
            width: 16px; height: 20px;
            background: linear-gradient(to bottom, #00f2ff, transparent);
            border-radius: 50%;
            filter: blur(2px);
            animation: engineBurn 0.1s infinite alternate;
        }

        @keyframes engineBurn { from { height: 15px; opacity: 0.7; } to { height: 25px; opacity: 1; } }

        /* --- JOGO --- */
        #ui-score { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 32px; font-weight: bold; text-shadow: 0 0 10px #00ffcc; z-index: 10; }
        .laser { position: absolute; width: 4px; height: 20px; background: #00ffcc; box-shadow: 0 0 8px #00ffcc; border-radius: 2px; z-index: 4; }
        .meteor { position: absolute; width: 45px; height: 45px; background: #444; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; box-shadow: inset -5px -5px 15px #000; z-index: 4; }
        
        #game-over-screen {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); padding: 30px; border: 2px solid #00ffcc; border-radius: 15px;
            text-align: center; z-index: 100;
        }
        button { background: #00ffcc; border: none; padding: 10px 20px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 15px; }

        @keyframes moveSat { from { left: -50px; } to { left: 110vw; } }
        @keyframes moonFloat { from { transform: translateY(-150px); } to { transform: translateY(110vh); } }
    </style>
</head>
<body>

<div id="game-container">
    <div class="moon"></div>
    <div id="ui-score">PONTOS: <span id="score-val">0</span></div>
    
    <div id="spaceship">
        <div class="ship-wing wing-l"></div>
        <div class="ship-wing wing-r"></div>
        <div class="ship-body"></div>
        <div class="ship-cockpit"></div>
        <div class="engine-fire"></div>
    </div>

    <div id="game-over-screen">
        <h1>FIM DE JOGO</h1>
        <p>Sua pontuação: <span id="final-score">0</span></p>
        <button onclick="restartGame()">JOGAR NOVAMENTE</button>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const spaceship = document.getElementById('spaceship');
    const scoreVal = document.getElementById('score-val');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreTxt = document.getElementById('final-score');

    let shipX = window.innerWidth / 2;
    let score = 0;
    let gameActive = true;

    document.addEventListener('keydown', (e) => {
        if (!gameActive) return;
        const speed = 40;
        if (e.key === 'ArrowLeft' && shipX > 40) shipX -= speed;
        if (e.key === 'ArrowRight' && shipX < window.innerWidth - 40) shipX += speed;
        if (e.key === ' ' || e.key === 'ArrowUp') shoot();
        spaceship.style.left = shipX + 'px';
    });

    function shoot() {
        const laser = document.createElement('div');
        laser.classList.add('laser');
        laser.style.left = shipX + 'px';
        laser.style.bottom = '80px';
        container.appendChild(laser);

        let laserPos = 80;
        const laserInterval = setInterval(() => {
            laserPos += 15;
            laser.style.bottom = laserPos + 'px';
            document.querySelectorAll('.meteor').forEach(met => {
                if (checkCollision(laser, met)) {
                    met.remove();
                    laser.remove();
                    clearInterval(laserInterval);
                    score += 10;
                    scoreVal.innerText = score;
                }
            });
            if (laserPos > window.innerHeight) { clearInterval(laserInterval); laser.remove(); }
        }, 16);
    }

    function createMeteor() {
        if (!gameActive) return;
        const meteor = document.createElement('div');
        meteor.classList.add('meteor');
        meteor.style.left = Math.random() * (window.innerWidth - 50) + 'px';
        meteor.style.top = '-60px';
        container.appendChild(meteor);

        let meteorY = -60;
        const fallInterval = setInterval(() => {
            meteorY += 4 + (score / 200);
            meteor.style.top = meteorY + 'px';
            if (checkCollision(meteor, spaceship)) gameOver();
            if (meteorY > window.innerHeight || !gameActive) { clearInterval(fallInterval); meteor.remove(); }
        }, 20);
    }

    function createSatellite() {
        if (!gameActive) return;
        const sat = document.createElement('div');
        sat.classList.add('satellite');
        sat.style.top = Math.random() * (window.innerHeight / 2) + 'px';
        sat.innerHTML = `<div class="sat-wing wing-left"></div><div class="sat-body"></div><div class="sat-wing wing-right"></div>`;
        container.appendChild(sat);
        setTimeout(() => sat.remove(), 8000);
    }

    function checkCollision(obj1, obj2) {
        const r1 = obj1.getBoundingClientRect();
        const r2 = obj2.getBoundingClientRect();
        return !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
    }

    function gameOver() {
        gameActive = false;
        finalScoreTxt.innerText = score;
        gameOverScreen.style.display = 'block';
    }

    function restartGame() {
        location.reload(); 
    }

    setInterval(createMeteor, 1000);
    setInterval(createSatellite, 4000);
</script>
</body>
</html>
